<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <title>AR Experience</title>

    <style>
      :root {
        --accent: #f97316;
        --panel: rgba(10, 10, 10, 0.82);
        --blur: blur(16px);
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        background: #121212;
        color: white;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        overflow: hidden;
      }

      /* ─── Top Navigation ─── */
      .top-nav {
        position: absolute;
        top: env(safe-area-inset-top, 20px);
        left: 20px;
        right: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 10;
        pointer-events: none;
      }

      .btn-back {
        pointer-events: auto;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: var(--blur);
        -webkit-backdrop-filter: var(--blur);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        padding: 10px 16px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .info-card {
        background: var(--panel);
        backdrop-filter: var(--blur);
        -webkit-backdrop-filter: var(--blur);
        padding: 10px 16px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        font-weight: bold;
        font-size: 0.95rem;
        max-width: 60%;
        text-align: right;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* ─── Model Viewer ─── */
      model-viewer {
        width: 100%;
        height: 100%;
        background-color: #1a1a1a;
        --poster-color: transparent;
      }

      /* ─── AR Button ─── */
      .ar-button {
        position: absolute;
        bottom: calc(env(safe-area-inset-bottom, 30px) + 30px);
        left: 50%;
        transform: translateX(-50%);
        background-color: var(--accent);
        color: white;
        padding: 16px 28px;
        border-radius: 50px;
        border: none;
        font-size: 1rem;
        font-weight: 800;
        box-shadow: 0 8px 20px rgba(249, 115, 22, 0.4);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
        z-index: 10;
        transition: transform 0.2s;
      }

      .ar-button:active {
        transform: translateX(-50%) scale(0.95);
      }

      /* Sembunyikan prompt default jika diperlukan */
      #ar-prompt {
        position: absolute;
        left: 50%;
        bottom: 120px;
        animation: notify 2s infinite;
        display: none;
      }
    </style>

    <script
      type="module"
      src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"
    ></script>
  </head>
  <body>
    <div class="top-nav">
      <a href="index.html" class="btn-back"><span>←</span> Kembali</a>
      <div class="info-card" id="experience-title">Memuat...</div>
    </div>

    <model-viewer
      id="ar-viewer"
      src=""
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      auto-rotate
      shadow-intensity="1.5"
      exposure="1"
      environment-image="neutral"
    >
      <button slot="ar-button" class="ar-button">
        <span>🚀</span> Mulai AR (Letakkan di Meja)
      </button>
    </model-viewer>

    <script src="js/ar-experience.js"></script>
  </body>
</html>
